<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moja pierwsza strona</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            color: darkblue;
        }
        h2 {
            color:blueviolet;
        }
        button {
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Witaj na mojej stronie!</h1>
    <p>To jest moja pierwsza strona internetowa 🎉</p>
    <button onclick="pokazAlert()">Kliknij mnie</button>
    <h2>Wojciech Gajda</h2>

    <script>
        function pokazAlert() {
            alert("Strona działa poprawnie!");
        }
    </script>

</body>
</html>
